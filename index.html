  // ─── TWEAKS PANEL ───────────────────────────────────────────────────────────
  const __TWEAKS_STYLE = `

      border-radius:6px;cursor:default;padding:4px 6px;line-height:1.2}
  `;

  function useTweaks(defaults) {
    const [values, setValues] = React.useState(defaults);
    const setTweak = React.useCallback((keyOrEdits, val) => {
      const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null ? keyOrEdits : { [keyOrEdits]: val };
      setValues((prev) => ({ ...prev, ...edits }));
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    }, []);
    return [values, setTweak];
  }

  function TweaksPanel({ title = 'Tweaks', children }) {
    const [open, setOpen] = React.useState(false);
    const dragRef = React.useRef(null);
    const offsetRef = React.useRef({ x: 16, y: 16 });
    React.useEffect(() => {
      const onMsg = (e) => {
        const t = e?.data?.type;
        if (t === '__activate_edit_mode') setOpen(true);
        else if (t === '__deactivate_edit_mode') setOpen(false);
      };
      window.addEventListener('message', onMsg);
      window.parent.postMessage({ type: '__edit_mode_available' }, '*');
      return () => window.removeEventListener('message', onMsg);
    }, []);
    const dismiss = () => { setOpen(false); window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); };
    if (!open) return null;
    return (
      <>
        <style>{__TWEAKS_STYLE}</style>
        <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
          <div className="twk-hd"><b>{title}</b>
            <button className="twk-x" onClick={dismiss}>✕</button>
          </div>
          <div className="twk-body">{children}</div>
        </div>
      </>
    );
  }

  function TweakSection({ label, children }) {
    return <><div className="twk-sect">{label}</div>{children}</>;
  }

  function TweakRadio({ label, value, options, onChange }) {
    const trackRef = React.useRef(null);
    const opts = options.map(o => typeof o === 'object' ? o : { value: o, label: o });
    const idx = Math.max(0, opts.findIndex(o => o.value === value));
    const n = opts.length;

    const segAt = (clientX) => {
      const r = trackRef.current.getBoundingClientRect();
      const i = Math.floor(((clientX - r.left - 2) / (r.width - 4)) * n);
      return opts[Math.max(0, Math.min(n - 1, i))].value;
    };
    const onPointerDown = (e) => {
      const v0 = segAt(e.clientX); if (v0 !== valueRef.current) onChange(v0);
      const move = (ev) => { const v = segAt(ev.clientX); if (v !== valueRef.current) onChange(v); };
      const up = () => { window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
      window.addEventListener('pointermove', move); window.addEventListener('pointerup', up);
    };
    return (
      <div className="twk-row">
        <div className="twk-lbl"><span>{label}</span></div>
        <div ref={trackRef} className="twk-seg" onPointerDown={onPointerDown}>
          <div className="twk-seg-thumb" style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`, width: `calc((100% - 4px) / ${n})` }} />

  function useInView(margin = "0px") {
    const ref = useRef(null);
    const [inView, setInView] = useState(false);
    useEffect(() => {
      const obs = new IntersectionObserver(([e]) => {
        if (e.isIntersecting) { setInView(true); obs.disconnect(); }
      }, { rootMargin: margin, threshold: 0.08 });
      if (ref.current) obs.observe(ref.current);
      return () => obs.disconnect();
    }, []);
    return [ref, inView];
  }

  function anim(inView, delay = 0, dir = "y") {
    return {
      opacity: inView ? 1 : 0,
      transform: inView ? "none" : dir === "y" ? "translateY(28px)" : "translateX(-20px)",
      transition: `opacity 0.7s ease ${delay}s, transform 0.7s ease ${delay}s`,
    };
  }

  function ScrollProgress() {
    const [progress, setProgress] = useState(0);
    useEffect(() => {
      const onScroll = () => {
        const scrollTop = window.scrollY;
        const docHeight = document.documentElement.scrollHeight - window.innerHeight;
        setProgress(docHeight > 0 ? (scrollTop / docHeight) * 100 : 0);
      };
      window.addEventListener("scroll", onScroll, { passive: true });
      return () => window.removeEventListener("scroll", onScroll);
    }, []);
    return (
      <div style={{ position: "fixed", top: 0, left: 0, right: 0, zIndex: 9999, height: 2, pointerEvents: "none" }}>
        <div style={{ height: "100%", background: "var(--copper)", width: `${progress}%`, transition: "width 0.1s linear" }} />
      </div>
    );

  const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];

  function MiniCalendar({ selected, onSelect }) {
    const today = new Date(); today.setHours(0,0,0,0);
    const [view, setView] = useState({ year: today.getFullYear(), month: today.getMonth() });
    const firstDay = new Date(view.year, view.month, 1).getDay();
    const daysInMonth = new Date(view.year, view.month + 1, 0).getDate();
    const cells = [];
    for (let i = 0; i < firstDay; i++) cells.push(null);
    for (let d = 1; d <= daysInMonth; d++) cells.push(d);
    return (
      <div style={{ background: "var(--card)", border: "1px solid rgba(0,0,0,0.07)", padding: 20 }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 16 }}>
          <button onClick={() => setView(v => v.month === 0 ? { year: v.year - 1, month: 11 } : { ...v, month: v.month - 1 })} style={{ background: "none", border: "none", cursor: "pointer", color: "var(--fg)", fontSize: 18, padding: "4px 8px" }}>‹</button>
          <span style={{ fontFamily: "Satoshi, sans-serif", fontWeight: 700, fontSize: 14 }}>{MONTHS[view.month]} {view.year}</span>
          <button onClick={() => setView(v => v.month === 11 ? { year: v.year + 1, month: 0 } : { ...v, month: v.month + 1 })} style={{ background: "none", border: "none", cursor: "pointer", color: "var(--fg)", fontSize: 18, padding: "4px 8px" }}>›</button>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 2, marginBottom: 4 }}>
          {DAYS.map(d => <span key={d} className="annotation" style={{ textAlign: "center", padding: "4px 0" }}>{d}</span>)}
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 2 }}>
          {cells.map((d, i) => {
            if (!d) return <span key={`e-${i}`} />;
            const date = new Date(view.year, view.month, d);
            const isPast = date < today;
            const isSunday = date.getDay() === 0;
            const disabled = isPast || isSunday;
            const isSelected = selected && selected.toDateString() === date.toDateString();
            const isToday = date.toDateString() === today.toDateString();
            return (
              <button key={d} disabled={disabled} onClick={() => onSelect(date)}
                style={{ padding: "7px 4px", border: isSelected ? "1px solid var(--copper)" : isToday ? "1px solid rgba(184,134,11,0.3)" : "1px solid transparent", background: isSelected ? "var(--copper)" : "transparent", color: isSelected ? "var(--bg)" : disabled ? "rgba(45,40,35,0.2)" : "var(--fg)", cursor: disabled ? "not-allowed" : "pointer", borderRadius: 2, fontSize: 13, fontFamily: "Inter, sans-serif", fontWeight: isToday ? 600 : 400, transition: "all 0.2s" }}>
                {d}
              </button>
            );
          })}
        </div>
      </div>
    );
  }

  // ─── TWEAKS ──────────────────────────────────────────────────────────────────
  const THEME_PRESETS = {
    Blueprint: { "--bg": "oklch(0.975 0.005 85)", "--fg": "oklch(0.20 0.010 65)", "--card": "oklch(0.985 0.004 85)", "--border": "oklch(0.88 0.010 75)", "--muted-fg": "oklch(0.50 0.015 65)", "--warm-stone": "oklch(0.93 0.008 75)" },
    Forge:     { "--bg": "oklch(0.14 0.008 50)",  "--fg": "oklch(0.94 0.005 80)", "--card": "oklch(0.18 0.007 50)", "--border": "oklch(0.28 0.008 55)", "--muted-fg": "oklch(0.60 0.010 70)", "--warm-stone": "oklch(0.22 0.006 55)" },
    Atelier:   { "--bg": "oklch(0.97 0.018 78)",  "--fg": "oklch(0.22 0.018 65)", "--card": "oklch(0.975 0.015 78)", "--border": "oklch(0.87 0.018 72)", "--muted-fg": "oklch(0.52 0.020 68)", "--warm-stone": "oklch(0.92 0.020 75)" },
  };
  const ACCENT_PRESETS = {
    Copper: { "--copper": "oklch(0.65 0.12 65)",  "--teal": "oklch(0.70 0.12 175)" },
    Teal:   { "--copper": "oklch(0.62 0.15 175)", "--teal": "oklch(0.65 0.12 65)" },
    Slate:  { "--copper": "oklch(0.55 0.10 250)", "--teal": "oklch(0.70 0.12 175)" },
    Brass:  { "--copper": "oklch(0.72 0.16 88)",  "--teal": "oklch(0.70 0.12 175)" },
  };
  const TYPE_PRESETS = {
    Precise:    { "--heading-scale": "1",    "--heading-track": "-0.03em", "--body-lh": "1.7",  "--section-pad": "96px" },
    Editorial:  { "--heading-scale": "0.92", "--heading-track": "0.01em",  "--body-lh": "1.85", "--section-pad": "112px" },
    Commanding: { "--heading-scale": "1.14", "--heading-track": "-0.045em","--body-lh": "1.65", "--section-pad": "80px" },
  };
  function applyVars(vars) { Object.entries(vars).forEach(([k, v]) => document.documentElement.style.setProperty(k, v)); }

  function AlvinTweaks() {
    const [tweaks, setTweak] = useTweaks(/*EDITMODE-BEGIN*/{ "theme": "Blueprint", "accent": "Copper", "type": "Precise" }/*EDITMODE-END*/);
    useEffect(() => {
      applyVars(THEME_PRESETS[tweaks.theme] || THEME_PRESETS.Blueprint);
      applyVars(ACCENT_PRESETS[tweaks.accent] || ACCENT_PRESETS.Copper);
      applyVars(TYPE_PRESETS[tweaks.type] || TYPE_PRESETS.Precise);
    }, [tweaks.theme, tweaks.accent, tweaks.type]);
    return (
      <TweaksPanel title="Alvin Physio">
        <TweakSection label="Atmosphere">
          <TweakRadio label="Theme" value={tweaks.theme} options={["Blueprint", "Forge", "Atelier"]} onChange={v => setTweak("theme", v)} />
        </TweakSection>
        <TweakSection label="Accent Colour">
          <TweakRadio label="Palette" value={tweaks.accent} options={["Copper", "Teal", "Slate", "Brass"]} onChange={v => setTweak("accent", v)} />
        </TweakSection>
        <TweakSection label="Type Rhythm">
          <TweakRadio label="Feel" value={tweaks.type} options={["Precise", "Editorial", "Commanding"]} onChange={v => setTweak("type", v)} />
        </TweakSection>
      </TweaksPanel>
    );
  }

  // ─── LANGUAGE CONTEXT ────────────────────────────────────────────────────────
  const LangCtx = createContext(null);

  function LangProvider({ children }) {
    const [lang, setLangState] = useState(() => {
      const saved = localStorage.getItem("alvin-lang");
      if (saved === "en" || saved === "zh") return saved;
      return navigator.language?.startsWith("zh") ? "zh" : "en";
    });
    const setLang = l => { setLangState(l); localStorage.setItem("alvin-lang", l); document.documentElement.lang = l === "zh" ? "zh-Hant" : "en-GB"; };
    const t = key => window.TRANSLATIONS[key]?.[lang] || key;
    return <LangCtx.Provider value={{ lang, setLang, t }}>{children}</LangCtx.Provider>;
  }

  // ─── APP ─────────────────────────────────────────────────────────────────────
  function App() {
    const { lang, setLang, t } = useContext(LangCtx);
    return (
      <>
        <Navigation lang={lang} setLang={setLang} t={t} />
        <main>
          <HeroSection t={t} />
          <AboutSection t={t} />
          <ServicesSection t={t} />
          <ProcessSection t={t} />
          <TransitLineSection t={t} />
          <TestimonialsSection t={t} lang={lang} />
          <BookingSection t={t} />
          <ContactFooter t={t} />
        </main>
        <AlvinTweaks />
      </>
    );
  }

  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(<LangProvider><App /></LangProvider>);
  </script>
</body>
</html>
